{{- $page := . -}}
{{- $lcp := false -}}
{{- if reflect.IsMap . -}}
  {{- $page = .page -}}
  {{- $lcp = .lcp | default false -}}
{{- end -}}

<article class="relative group bg-zinc-100 hover:bg-blue-100 rounded-3xl">
	
	<a class="insert-link" href="{{ $page.Permalink }}"></a>

	<figure class="w-full aspect-video overflow-hidden rounded-3xl">

		{{- if $page.Params.image }}

		  {{- if (strings.HasPrefix $page.Params.image "http") }}

			<img class="object-cover group-hover:scale-105 transition duration-500 cursor-pointer" src="{{ $page.Params.image }}" alt="{{ $page.Name }}" style="width: 100%; height: 100%; object-fit: cover;" decoding="async"{{ if $lcp }} fetchpriority="high"{{ else }} loading="lazy"{{ end }}>

		  {{- else }}

			{{- with $imgcard := resources.Get $page.Params.image -}}
			  {{- $imgcard = $imgcard.Fill "640x360 q85" -}}
  <img class="object-cover group-hover:scale-105 transition duration-500 cursor-pointer" src="{{ $imgcard.RelPermalink }}" alt="{{ $page.Name }}" width="{{ $imgcard.Width }}" height="{{ $imgcard.Height }}" decoding="async"{{ if $lcp }} fetchpriority="high"{{ else }} loading="lazy"{{ end }}>
{{- end }}

		  {{- end }}

		{{- end }}

	  </figure>

	<div class="p-6">

		<time datetime="{{ $page.Date.Format "2006-01-02T15:04:05-07:00" | safeHTML }}">{{ $page.Date.Format "02.01.2006" }}</time>

		<h3 class="my-4 text-2xl font-bold">{{ $page.LinkTitle }}</h3>

		<p class="text-normal leading-normal text-zinc-500 line-clamp-2">{{ $page.Params.description }}</p>

	</div>
</article>
