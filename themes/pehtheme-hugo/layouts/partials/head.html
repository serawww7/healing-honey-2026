<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Dynamic title for SEO -->
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>
<link rel="canonical" href="{{ .Permalink }}">
<!-- Dynamic description for SEO -->
<meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Params.description }}{{ end }}">
<meta property="og:type" content="article">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ .Description }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }}">
<meta name="twitter:description" content="{{ .Description }}">
<meta name="author" content="Сергій Поліщук">
<meta name="publisher" content="Цілющий мед">
<meta name="robots" content="index, follow">


<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"Blog",
 "name":"Блог пасічника Сергія Поліщука",
 "url":"https://healing-honey.pp.ua"
}
</script>
{{- partial "head/lcp.html" . -}}
{{- partial "head/css.html" . -}}
{{- partialCached "head/favicon.html" . -}}
